<!DOCTYPE html>
<html>
<head>
    <title>Special Message</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial;
            padding-top: 100px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #ff4e50;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 {{ card.recipient_name }} 🎉</h1>
        <p>{{ card.message }}</p>
    </div>
</body>
</html>
