{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Celebration</title>
    <link rel="stylesheet" href="{% static 'Cards/style.css' %}">
</head>

<body>

<!--div class="flares"></div-->

<div class="card">

    <div class="message-box" id="messageBox" style="display: none;">
        <h1>🎉 Serena, My love 💛🎉</h1>
        <p>
            Hey love, I just wanted to remind you how special you are to me.
            Your smile, your heart, and the way you care for others make my world
            brighter every single day. I’m really grateful to have you in my life. 💛💖
        </p>
    </div>

    <button class="open-btn" id="openBtn">
        💌 Made from Love, With Love, for Love
    </button>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const flareContainer = document.querySelector('.flares');

    function createFlare() {
        const flare = document.createElement('div');
        flare.classList.add('flare');

        flare.innerHTML = "💖";

        flare.style.left = Math.random() * window.innerWidth + "px";
        flare.style.animationDuration = (Math.random() * 3 + 2) + "s";

        flareContainer.appendChild(flare);

        setTimeout(() => {
            flare.remove();
        }, 5000);
    }

    setInterval(createFlare, 150);

    const openBtn = document.getElementById("openBtn");
    const messageBox = document.getElementById("messageBox");

    openBtn.addEventListener("click", function() {
        openBtn.style.display = "none";
        messageBox.style.display = "block";

        setTimeout(() => {
            messageBox.style.opacity = "1";
            messageBox.style.transform = "scale(1)";
        }, 50);
    });

});
</script>

</body>
</html>
